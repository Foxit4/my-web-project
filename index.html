<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мій профіль | Владислав</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Владислав</h1>
        <nav aria-label="Головна навігація">
            <ul>
                <li><a href="#about">Про мене</a></li>
                <li><a href="#projects">Проєкти</a></li>
                <li><a href="#api-section">Блог</a></li>
                <li><button id="theme-toggle" class="nav-btn">Змінити тему</button></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="about">
            <h2>Про мене</h2>
            <p>Я студент другого курсу, вивчаю фронтенд-розробку та цікавлюся сучасними технологіями.</p>
        </section>

        <section id="projects">
            <h2>Мої проєкти</h2>
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Пошук проєктів за назвою...">
            </div>
            <div class="projects-container" id="projects-container"></div>
        </section>

        <hr>

        <section id="api-section">
            <h2>Останні новини з API</h2>
            <p id="loading">Завантаження...</p>
            <div id="posts-container"></div>
        </section>

        <section style="text-align: center; margin: 3rem 0;">
            <button id="open-modal" class="btn-primary">Зв'язатися зі мною</button>
        </section>

        <div id="modal" class="modal">
            <div class="modal-content">
                <button id="close-modal" class="close-btn" aria-label="Закрити модальне вікно">&times;</button>
                <h2>Контакти</h2>
                <form id="contact-form">
                    <div class="form-group">
                        <label for="user-name">Ваше ім'я:</label>
                        <input type="text" id="user-name" placeholder="Введіть ім'я" required>
                    </div>
                    <button type="submit" class="btn-submit">Надіслати</button>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <p id="contacts">Контакти: <a href="mailto:lenv58758@gmail.com">lenv58758@gmail.com</a></p>
        <p>&copy; 2026 Всі права захищено</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
